version: "3.8"

services:
  mysql-db:
    image: mysql:8.0
    container_name: agriweather-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agriweather_db
      MYSQL_USER: agriuser
      MYSQL_PASSWORD: agripass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/agriweather.sql:/docker-entrypoint-initdb.d/agriweather.sql

volumes:
  mysql_data:
