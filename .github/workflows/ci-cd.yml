name: CI/CD AgriWeather AI

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Test Backend Python Syntax
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/database.py

      - name: Test AI Service Python Syntax
        run: |
          python -m py_compile ai-service/main.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Build Backend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-backend:latest ./backend

      - name: Build AI Service Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-service:latest ./ai-service

      - name: Build Frontend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-frontend:latest ./frontend

      - name: Push Backend Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-backend:latest

      - name: Push AI Service Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-service:latest

      - name: Push Frontend Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-frontend:latest

  deploy-frontend:
    needs: build-test-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Frontend to Frontend EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-frontend:latest
            sudo docker rm -f agriweather-frontend 2>/dev/null || true
            sudo docker run -d \
              --name agriweather-frontend \
              --restart unless-stopped \
              -p 80:5173 \
              ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-frontend:latest
            sudo docker image prune -f
            sudo docker ps

  deploy-backend:
    needs: build-test-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend to Backend EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-backend:latest
            sudo docker rm -f agriweather-backend 2>/dev/null || true
            sudo docker run -d \
              --name agriweather-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              -e DATABASE_URL="mysql+pymysql://agriuser:agripass@10.30.1.254:3306/agriweather_db" \
              -e AI_SERVICE_URL="http://10.40.1.161:8001" \
              -e GOOGLE_APPLICATION_CREDENTIALS="/gcp/adc.json" \
              -e GCS_BUCKET_NAME="agriweather-ai-datasets-rikki-152022055" \
              -v /home/ubuntu/.config/gcloud/application_default_credentials.json:/gcp/adc.json:ro \
              ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-backend:latest
            sudo docker image prune -f
            sudo docker ps

  deploy-ai:
    needs: build-test-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy AI Service to AI EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AI_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-service:latest
            sudo docker rm -f agriweather-ai-service 2>/dev/null || true
            sudo docker run -d \
              --name agriweather-ai-service \
              --restart unless-stopped \
              -p 8001:8001 \
              ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-service:latest
            sudo docker image prune -f
            sudo docker ps
