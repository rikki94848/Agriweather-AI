name: AgriWeather AI CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test AgriWeather AI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Python setup
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # Backend check
      # =========================
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Check backend syntax
        run: |
          python -m compileall backend

      # =========================
      # AI Service check
      # =========================
      - name: Install AI service dependencies
        run: |
          pip install -r ai-service/requirements.txt

      - name: Check AI service syntax
        run: |
          python -m compileall ai-service

      # =========================
      # Frontend build
      # =========================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Fix Vite permission
        working-directory: frontend
        run: |
          chmod +x ./node_modules/.bin/vite

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      # =========================
      # Docker image build
      # =========================
      - name: Build backend Docker image
        run: |
          docker build -t agriweather-backend ./backend

      - name: Build AI service Docker image
        run: |
          docker build -t agriweather-ai-service ./ai-service

      - name: Build frontend Docker image
        run: |
          docker build -t agriweather-frontend ./frontend
