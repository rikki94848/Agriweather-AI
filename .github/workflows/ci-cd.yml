name: AgriWeather AI CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-and-push:
    name: Build, Test, and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Python setup
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # Backend check
      # =========================
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Check backend syntax
        run: |
          python -m compileall backend

      # =========================
      # AI Service check
      # =========================
      - name: Install AI service dependencies
        run: |
          pip install -r ai-service/requirements.txt

      - name: Check AI service syntax
        run: |
          python -m compileall ai-service

      # =========================
      # Frontend build
      # =========================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Fix Vite permission
        working-directory: frontend
        run: |
          chmod +x ./node_modules/.bin/vite

      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

      # =========================
      # Docker Hub login
      # =========================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================
      # Build and push Docker images
      # =========================
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-backend:${{ github.sha }}

      - name: Build and push AI service image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-service:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agriweather-ai-frontend:${{ github.sha }}
